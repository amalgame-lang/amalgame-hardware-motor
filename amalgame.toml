# Package manifest — amalgame-hardware-motor
#
# Portable motor / actuator drivers over the Amalgame.Hal interfaces:
# one driver, runs on Raspberry Pi (amalgame-hardware-gpio) and future
# MCU backends. Part of the Amalgame.Hardware component family.
#
#   Servo    — hobby servo / ESC on a PwmOut (1–2 ms, 0..180° / 0..100%)
#   DcMotor  — H-bridge: 2x DigitalOut + PwmOut enable; Forward/Reverse/Stop/Brake
#   Stepper  — 28BYJ-48 unipolar, 4x DigitalOut + Clock; half-step Step(n, delayMs)
#   Relay    — switch on a DigitalOut (active-high or active-low)
#
# Pure Amalgame; no C, no system dependency (the backend brings those).

[package]
name              = "amalgame-hardware-motor"
version           = "0.4.0"
license           = "Apache-2.0"
description       = "Portable motor/actuator drivers (servo/ESC, DC via H-bridge, 28BYJ-48 stepper, relay) over Amalgame.Hal — one driver, runs on Raspberry Pi and future MCU backends. For drones, 3D printers, robots."
authors           = ["Bastien Mouget"]
required-amalgame = ">=0.8.72"
schema-version    = 1

[stdlib]
classes   = ["Servo", "DcMotor", "Stepper", "Relay", "Pca9685", "Pca9685Channel", "A4988", "Buzzer", "AccelStepper"]
header    = "facade-stub.h"
namespace = "Amalgame.Hardware.Motor"
facade    = "facade.am"

[dependencies]
amalgame-hal = ">=0.1.0"
